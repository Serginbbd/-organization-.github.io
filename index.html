<!DOCTYPE html>
<html>
<head>
    <title>Gerador de E-mails de Teste</title>
</head>
<body>
    <h1>Gerador de E-mails de Teste</h1>

    <button onclick="gerar()">Gerar</button>

    <p id="email"></p>

    <script>
        function gerar() {
            const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
            let usuario = "";

            for(let i = 0; i < 10; i++) {
                usuario += chars[Math.floor(Math.random() * chars.length)];
            }

            document.getElementById("email").innerText =
                usuario + "@teste.com";
        }
    </script>
</body>
</html>
